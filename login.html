<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - BookBar</title>
    <link rel="stylesheet" href="bookshelf.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f3f6;
        }
        .login-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            gap: 4rem;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        .left-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .large-logo {
            font-family: 'Cinzel', serif;
            font-size: 180px;
            font-weight: 700;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 1.5rem;
            letter-spacing: -10px;
            text-shadow: 0 2px 10px rgba(30, 60, 92, 0.1);
        }
        .tagline {
            font-size: 1rem;
            color: #a0b0c0;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-family: 'Segoe UI', sans-serif;
            font-style: italic;
            opacity: 0.8;
        }
        .right-section {
            flex: 1;
            max-width: 550px;
            min-width: 450px;
        }
        .form-card {
            background: white;
            border-radius: 12px;
            padding: 3rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }
        .form-title {
            font-family: 'Cinzel', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .form-subtitle {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-color);
            font-size: 0.9rem;
        }
        .form-group input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }
        .login-button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .account-link {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        .account-link p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        .account-link a {
            color: var(--secondary-color);
            text-decoration: none;
            font-weight: 500;
        }
        .account-link a:hover {
            text-decoration: underline;
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.9rem;
        }
        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
                gap: 2rem;
            }
            .large-logo {
                font-size: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <header class="header">
            <div class="header-container">
                <div class="header-left">
                    <a href="index.html" class="logo">
                        <span class="logo-bb">
                            <span class="b1">B</span><span class="b2">B</span>
                        </span>
                        <span class="logo-text">BookBar</span>
                    </a>
                    <nav>
                        <ul class="nav-links">
                            <li><a href="index.html">Book List</a></li>
                            <li><a href="index.html">My Favorites</a></li>
                            <li><a href="index.html">Authors</a></li>
                        </ul>
                    </nav>
                </div>
                <div class="header-right">
                    <div class="header-auth-buttons">
                        <button class="btn-login" onclick="window.location.href='login.html'">LOG IN</button>
                        <button class="btn-signup" onclick="window.location.href='signup.html'">SIGN UP</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-content">
            <div class="left-section">
                <div class="large-logo">BB</div>
                <div class="tagline">YOUR PERSONAL LIBRARY</div>
            </div>
            
            <div class="right-section">
                <div class="form-card">
                    <h2 class="form-title">WELCOME BACK</h2>
                    <p class="form-subtitle">Log in to your Bookbar account</p>
                    
                    <div id="error-message" class="error-message"></div>
                    
                    <form id="login-form">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" required autofocus>
                        </div>
                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" required>
                        </div>
                        <button type="submit" class="login-button">Log In</button>
                    </form>
                    
                    <div class="account-link">
                        <p>Don't have an account?</p>
                        <a href="signup.html">Create an account →</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="translations.js"></script>
    <script>
        const API_BASE_URL = 'http://localhost:3000/api';
        
        async function apiRequest(endpoint, options = {}) {
            const token = localStorage.getItem('bookbar_token');
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (token) {
                headers['Authorization'] = `Bearer ${token}`;
            }

            try {
                const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                    ...options,
                    headers
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'API request failed');
                }

                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('error-message');
            
            errorDiv.style.display = 'none';
            
            try {
                const data = await apiRequest('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                if (data.success && data.token) {
                    localStorage.setItem('bookbar_token', data.token);
                    localStorage.setItem('bookbar_user', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    throw new Error(data.message || 'Login failed');
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Login failed. Please check your credentials.';
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
